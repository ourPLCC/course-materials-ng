site_name: Programming Languages with PLCC
site_url: https://ourplcc.github.io/course-materials-ng/
repo_url: https://github.com/ourPLCC/course-materials-ng
repo_name: ourPLCC/course-materials-ng
docs_dir: textbook

copyright: >
  Textbook content licensed under
  <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>.

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - content.tabs
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mike
  - kroki:
      fence_prefix: ''
      tag_format: svg
  - autorefs

nav:
  - Home: index.md
  - Introduction: 00-introduction.md
  - Overview: 01-overview.md
  - Tokens: 02-tokens.md
  - Syntax: 03-syntax.md

extra:
  version:
    provider: mike

markdown_extensions:
  - attr_list
  - pymdownx.superfences
